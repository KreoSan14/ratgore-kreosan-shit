- type: entity
  id: CrescentCartridge_5.56x45mm
  name: cartridge (5.56x45mm)
  parent: BaseCrescentCartridge
  abstract: true
  components:
  - type: Tag
    tags:
    - Cartridge
    - CrescentCartridge_5.56x45mm
  - type: CartridgeAmmo
    proto: CrescentBullet_5.56x45mm
  - type: Sprite
    sprite: _Crescent\Objects\Weapons\Ammunition\New_Ammo\Casings\5.56x45.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
