  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - CrescentCartridge_5.56x45mm
    proto: CrescentCartridge_5.56x45mm
    capacity: 60
  - type: Item
    size: Small
  - type: Sprite
    sprite: _Crescent\Objects\Weapons\Ammunition\New_Ammo\Boxes\Intermediary.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
