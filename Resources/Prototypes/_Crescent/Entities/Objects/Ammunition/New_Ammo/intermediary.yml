    damage:
      types:
        Piercing: 1000 # DEAAAR ERMAAAAC IF YOU DO NOT FIX THIS CHAOS WILL RAIN DOWN AND TTK SHALL PLUMMET BECAUSE I FELT LIKE MAKING IT DO 1K
    harmorPenetration: 30
    stoppingPower: 4



- type: entity
