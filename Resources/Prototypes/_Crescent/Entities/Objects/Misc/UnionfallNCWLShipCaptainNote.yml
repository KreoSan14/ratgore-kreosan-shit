  - type: Paper
    content: |
      NEW CRESCENT WORKERS LEAGUE
      ENGINEERING SECTION REPORT

      Comrade Commander,

      Since the loss of our station we
      have received no supplies and have
      been travelling for a considerable
      time.

      I understand that your expectation
      of me is to keep this vessel
      operational.

      However, without resupply for much
      longer, I fear the ship will
      eventually lose its ability to
      function if we do not reach our
      new home soon.

      ------------------------------------------------

      ENGINEERING STATUS

      My intention is not to damage
      morale.

      The engineering team is already
      working tirelessly to keep the
      ship together and I am doing my
      best to maintain their spirits.

      This information remains strictly
      between you and me.

      I have not informed them of the
      situation.

      To keep morale high I continue
      to assure them that everything
      is under control.

      ------------------------------------------------

      Everything for the Cause.

      Glory to the Workers.